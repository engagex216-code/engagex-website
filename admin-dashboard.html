<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Panel – EngageX</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap');
:root{--navy:#0A0A0A;--gold:#D4A017;--gold-light:#F5C842;--white:#FFFFFF;--gray:#8892A4;--card-bg:#141414;--border:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:380px;text-align:center;}
.login-card h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px;}
.login-card p{color:var(--gray);font-size:13px;margin-bottom:28px;}
.login-card input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:white;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px;transition:border-color .2s;}
.login-card input:focus{border-color:var(--gold);}
.login-card button{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0A0A0A;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.login-err{color:#f87171;font-size:13px;margin-bottom:12px;display:none;}

/* ADMIN PANEL */
#adminPanel{display:none;flex-direction:column;min-height:100vh;}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 5%;background:rgba(0,0,0,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:white;text-decoration:none;}
.logo span{color:var(--gold-light);}
.admin-tag{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.logout-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:rgba(255,255,255,0.6);padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;}
.logout-btn:hover{color:white;}

.page-wrap{padding:28px 5%;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:20px;}
.stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--gold-light);}
.stat-label{font-size:12px;color:var(--gray);margin-top:4px;}

/* FILTER */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
.filter-btn{padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:rgba(255,255,255,0.5);font-family:inherit;transition:all .2s;}
.filter-btn.active{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,0.4);color:var(--gold-light);}
.search-input{padding:9px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:inherit;outline:none;width:220px;}
.search-input:focus{border-color:var(--gold);}
.refresh-btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid rgba(212,160,23,0.3);background:rgba(212,160,23,0.08);color:var(--gold-light);font-family:inherit;}

/* ORDER CARDS */
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:16px;}
.order-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px;transition:border-color .2s;}
.order-card:hover{border-color:rgba(212,160,23,0.25);}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.order-id{font-family:monospace;font-size:14px;font-weight:700;color:var(--gold-light);}
.order-service{font-size:15px;font-weight:700;margin-bottom:2px;}
.order-meta{font-size:12px;color:var(--gray);}
.order-time{font-size:11px;color:var(--gray);margin-top:4px;}

.status-badge{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.status-Pending{background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.status-Verified{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.3);color:#93c5fd;}
.status-In-Progress{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);color:#c4b5fd;}
.status-Completed{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
.status-Rejected{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171;}

.order-details{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;padding:14px;background:rgba(255,255,255,0.02);border-radius:10px;}
.detail-label{font-size:11px;color:var(--gray);margin-bottom:3px;}
.detail-val{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);word-break:break-all;}
.detail-val a{color:var(--gold-light);text-decoration:none;}

.action-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.action-select{padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:inherit;outline:none;cursor:pointer;}
.action-select:focus{border-color:var(--gold);}
.action-select option{background:#141414;}
.act-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.act-update{background:rgba(212,160,23,0.12);border:1px solid rgba(212,160,23,0.3);color:var(--gold-light);}
.act-verify{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
.act-reject{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.act-email{background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.3);color:#c4b5fd;}
.act-progress{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);color:#4ade80;}
.progress-section{margin-top:14px;padding:14px;background:rgba(255,255,255,0.02);border-radius:10px;border:1px solid rgba(212,160,23,0.1);}
.progress-section .p-title{font-size:12px;color:var(--gray);font-weight:600;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;}
.progress-inputs{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
.progress-inputs input{padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:inherit;outline:none;width:100px;}
.progress-inputs input:focus{border-color:var(--gold);}
.progress-inputs textarea{padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:inherit;outline:none;flex:1;min-width:180px;height:36px;resize:none;}
.progress-inputs textarea:focus{border-color:var(--gold);}
.progress-bar-wrap{background:#111;border-radius:6px;height:8px;overflow:hidden;margin-top:8px;}
.progress-bar-fill{height:8px;background:linear-gradient(90deg,#D4A017,#F5C842);border-radius:6px;transition:width .3s;}
.act-btn:hover{opacity:0.8;transform:translateY(-1px);}

.empty-state{padding:48px;text-align:center;color:var(--gray);background:var(--card-bg);border:1px solid var(--border);border-radius:14px;}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;border:1px solid rgba(212,160,23,0.3);color:white;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
.loading{text-align:center;padding:48px;color:var(--gray);}
.spinner{width:36px;height:36px;border:3px solid rgba(212,160,23,0.2);border-top-color:var(--gold-light);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{padding:24px 5%;border-top:1px solid var(--border);text-align:center;color:var(--gray);font-size:12px;margin-top:auto;}
@media(max-width:768px){.filter-bar{gap:6px;}.search-input{width:100%;}.order-details{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div style="font-size:36px;margin-bottom:14px;">⚙️</div>
    <h2>Admin Access</h2>
    <p>EngageX internal panel — authorized access only</p>
    <div class="login-err" id="loginErr">Incorrect password. Try again.</div>
    <input type="password" id="adminPass" placeholder="Admin password" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <button onclick="doAdminLogin()">Access Dashboard →</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <nav>
    <a href="index.html" class="logo">Engage<span>X</span></a>
    <div class="nav-right">
      <span class="admin-tag">⚙️ ADMIN</span>
      <button class="logout-btn" onclick="doAdminLogout()">Logout</button>
    </div>
  </nav>

  <div class="page-wrap">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="aTotal">—</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-num" id="aPending">—</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num" id="aVerified">—</div><div class="stat-label">Verified</div></div>
      <div class="stat-card"><div class="stat-num" id="aProgress">—</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card"><div class="stat-num" id="aCompleted">—</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-num" id="aUsers">—</div><div class="stat-label">Total Users</div></div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending',this)">⏳ Pending</button>
      <button class="filter-btn" onclick="setFilter('Verified',this)">✅ Verified</button>
      <button class="filter-btn" onclick="setFilter('In Progress',this)">🔄 In Progress</button>
      <button class="filter-btn" onclick="setFilter('Completed',this)">🏁 Completed</button>
      <button class="filter-btn" onclick="setFilter('Rejected',this)">❌ Rejected</button>
      <input type="text" class="search-input" id="searchInput" placeholder="Search order, email, business…" oninput="renderOrders()"/>
      <button class="refresh-btn" onclick="loadAllData()">🔄 Refresh</button>
    </div>

    <div class="section-title">Orders <span id="orderCount" style="color:var(--gray);font-weight:400;font-size:14px;"></span></div>
    <div id="ordersList"><div class="loading"><div class="spinner"></div><p>Loading orders…</p></div></div>
  </div>

  <footer>EngageX Admin Panel · Private Access Only · <a href="https://wa.me/919058544981" style="color:var(--gold-light);">WhatsApp</a></footer>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = 'aman@ybl';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxQZju9JeTJMPYqgzSb5D0PwU84EABOTYJNMgBlyGfJ286_U_4UU7HYWLDEaTMyDdg/exec';

let allOrders = [];
let allUsers  = [];
let currentFilter = 'All';

// ── AUTH ──────────────────────────────────────────────────────
function doAdminLogin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASSWORD) {
    sessionStorage.setItem('ex_admin', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'flex';
    loadAllData();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function doAdminLogout() {
  sessionStorage.removeItem('ex_admin');
  location.reload();
}

window.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('ex_admin') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display  = 'flex';
    loadAllData();
  }
  document.getElementById('adminPass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doAdminLogin();
  });
});

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadAllData() {
  document.getElementById('ordersList').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading orders…</p></div>';
  try {
    const [ordersRes, usersRes] = await Promise.all([
      fetch(GAS_URL + '?action=getAllOrders'),
      fetch(GAS_URL + '?action=getAllUsers')
    ]);
    const ordersText = await ordersRes.text();
    const usersText  = await usersRes.text();

    const ordersMatch = ordersText.match(/\{[\s\S]*\}/);
    const usersMatch  = usersText.match(/\{[\s\S]*\}/);

    if (ordersMatch) {
      const data = JSON.parse(ordersMatch[0]);
      allOrders = (data.success && data.orders) ? data.orders : [];
    }
    if (usersMatch) {
      const data = JSON.parse(usersMatch[0]);
      allUsers = (data.success && data.users) ? data.users : [];
    }
  } catch(e) {
    console.warn('Load error:', e);
    allOrders = [];
  }
  updateStats();
  renderOrders();
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('aTotal').textContent     = allOrders.length;
  document.getElementById('aPending').textContent   = allOrders.filter(o => o.status === 'Pending').length;
  document.getElementById('aVerified').textContent  = allOrders.filter(o => o.status === 'Verified').length;
  document.getElementById('aProgress').textContent  = allOrders.filter(o => o.status === 'In Progress').length;
  document.getElementById('aCompleted').textContent = allOrders.filter(o => o.status === 'Completed').length;
  document.getElementById('aUsers').textContent     = allUsers.length;
}

// ── FILTERS ───────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

// ── RENDER ORDERS ─────────────────────────────────────────────
function renderOrders() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = allOrders.filter(o => {
    const matchFilter = currentFilter === 'All' || o.status === currentFilter;
    const matchSearch = !search ||
      (o.orderId    || '').toLowerCase().includes(search) ||
      (o.userEmail  || '').toLowerCase().includes(search) ||
      (o.userName   || '').toLowerCase().includes(search) ||
      (o.bizName    || '').toLowerCase().includes(search) ||
      (o.service    || '').toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  document.getElementById('orderCount').textContent = '(' + filtered.length + ')';

  const list = document.getElementById('ordersList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state">No orders found for this filter.</div>';
    return;
  }

  list.innerHTML = filtered.slice().reverse().map(o => `
    <div class="order-card" id="card-${o.orderId}">
      <div class="order-top">
        <div>
          <div class="order-id">${o.orderId || '—'}</div>
          <div class="order-service">${o.service || '—'}</div>
          <div class="order-meta">${o.userName || '—'} · ${o.userEmail || '—'}</div>
          <div class="order-time">📅 ${o.submittedAt ? new Date(o.submittedAt).toLocaleString('en-IN') : '—'}</div>
        </div>
        <span class="status-badge status-${(o.status || 'Pending').replace(/\s+/g,'-')}">${o.status || 'Pending'}</span>
      </div>

      <div class="order-details">
        <div>
          <div class="detail-label">Business</div>
          <div class="detail-val">${o.bizName || '—'}</div>
        </div>
        <div>
          <div class="detail-label">Amount</div>
          <div class="detail-val" style="color:var(--gold-light);font-weight:800;">${o.total || '—'}</div>
        </div>
        <div>
          <div class="detail-label">Txn ID</div>
          <div class="detail-val" style="font-family:monospace;font-size:12px;">${o.txnId || '—'}</div>
        </div>
        <div>
          <div class="detail-label">WhatsApp</div>
          <div class="detail-val">${o.waNumber ? `<a href="https://wa.me/${o.waNumber.replace(/\D/g,'')}" target="_blank">${o.waNumber}</a>` : '—'}</div>
        </div>
        ${o.userEmail ? `<div><div class="detail-label">Email</div><div class="detail-val"><a href="mailto:${o.userEmail}">${o.userEmail}</a></div></div>` : ''}
      </div>

      <div class="action-row">
        <select class="action-select" id="sel-${o.orderId}">
          <option value="Pending"     ${o.status==='Pending'     ?'selected':''}>Pending</option>
          <option value="Verified"    ${o.status==='Verified'    ?'selected':''}>Verified</option>
          <option value="In Progress" ${o.status==='In Progress' ?'selected':''}>In Progress</option>
          <option value="Completed"   ${o.status==='Completed'   ?'selected':''}>Completed</option>
          <option value="Rejected"    ${o.status==='Rejected'    ?'selected':''}>Rejected</option>
        </select>
        <button class="act-btn act-update"  onclick="updateStatus('${o.orderId}')">💾 Update</button>
        <button class="act-btn act-verify"  onclick="quickStatus('${o.orderId}','Verified')">✅ Verify</button>
        <button class="act-btn act-reject"  onclick="quickStatus('${o.orderId}','Rejected')">❌ Reject</button>
        <button class="act-btn act-email"   onclick="sendEmail('${o.orderId}')">📧 Email Client</button>
      </div>

      <div class="progress-section">
        <div class="p-title">📊 Progress Tracker — updates client dashboard &amp; sends email</div>
        <div class="progress-inputs">
          <input type="number" id="prog-${o.orderId}" placeholder="Done e.g. 10" value="${o.progress||0}" min="0" oninput="updateProgressBar('${o.orderId}')"/>
          <span style="color:var(--gray);font-size:13px;">of</span>
          <input type="number" id="tgt-${o.orderId}" placeholder="Total e.g. 50" value="${o.target||0}" min="0" oninput="updateProgressBar('${o.orderId}')"/>
          <textarea id="note-${o.orderId}" placeholder="Note e.g. 10 reviews posted, 40 remaining…" style="flex:1;min-width:180px;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:white;font-size:13px;font-family:inherit;outline:none;height:36px;resize:none;">${o.note||''}</textarea>
          <button class="act-btn act-progress" onclick="saveProgress('${o.orderId}')">📊 Save Progress</button>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="bar-${o.orderId}" style="width:${o.target>0?Math.round((o.progress/o.target)*100):0}%;"></div>
        </div>
        <div id="pct-${o.orderId}" style="font-size:12px;color:var(--gray);margin-top:4px;">${o.target>0?Math.round((parseInt(o.progress)||0)/(parseInt(o.target)||1)*100):0}% complete &bull; ${o.progress||0}/${o.target||0}</div>
      </div>
    </div>`).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────
async function updateStatus(orderId) {
  const status = document.getElementById('sel-' + orderId)?.value;
  if (!status) return;
  await gasPost({ action: 'updateStatus', orderId, status });
  const order = allOrders.find(o => o.orderId === orderId);
  if (order) order.status = status;
  updateStats();
  renderOrders();
  showToast('✅ ' + orderId + ' → ' + status);
}

function quickStatus(orderId, status) {
  const sel = document.getElementById('sel-' + orderId);
  if (sel) sel.value = status;
  updateStatus(orderId);
}

function updateProgressBar(orderId) {
  const prog = parseInt(document.getElementById('prog-' + orderId)?.value) || 0;
  const tgt  = parseInt(document.getElementById('tgt-'  + orderId)?.value) || 0;
  const pct  = tgt > 0 ? Math.min(100, Math.round((prog / tgt) * 100)) : 0;
  const bar  = document.getElementById('bar-' + orderId);
  const pctEl= document.getElementById('pct-' + orderId);
  if (bar)   bar.style.width = pct + '%';
  if (pctEl) pctEl.textContent = pct + '% complete · ' + prog + '/' + tgt;
}

async function saveProgress(orderId) {
  const order    = allOrders.find(o => o.orderId === orderId);
  if (!order) return;
  const progress = document.getElementById('prog-'  + orderId)?.value || '0';
  const target   = document.getElementById('tgt-'   + orderId)?.value || '0';
  const note     = document.getElementById('note-'  + orderId)?.value || '';

  await gasPost({
    action: 'updateProgress',
    orderId,
    progress,
    target,
    note,
    userEmail: order.userEmail,
    userName:  order.userName,
    service:   order.service
  });

  // Update local data
  order.progress = progress;
  order.target   = target;
  order.note     = note;

  showToast('📊 Progress updated + email sent to ' + order.userEmail);
}

async function sendEmail(orderId) {
  const order = allOrders.find(o => o.orderId === orderId);
  if (!order) return;
  const status = document.getElementById('sel-' + orderId)?.value || order.status;
  await gasPost({ action: 'sendStatusEmail', orderId, status, userEmail: order.userEmail, userName: order.userName, service: order.service });
  showToast('📧 Email sent to ' + order.userEmail);
}

async function gasPost(payload) {
  try {
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) { console.warn('POST error:', e); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
