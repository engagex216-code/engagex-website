<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin – EngageX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap');
:root{--navy:#0A0A0A;--gold:#D4A017;--gold-light:#F5C842;--white:#FFFFFF;--gray:#8892A4;--card-bg:#141414;--border:rgba(255,255,255,0.07);--green:#22C55E;--red:#EF4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* ── LOGIN ── */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-box{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:44px;width:100%;max-width:400px;}
.login-box h2{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px;}
.login-box .sub{color:var(--gray);font-size:14px;margin-bottom:28px;}
.fg{margin-bottom:18px;}
.fg label{display:block;font-size:12px;color:var(--gray);margin-bottom:7px;font-weight:500;}
.fg input{width:100%;padding:13px 15px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:9px;color:white;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.fg input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));color:#0A0A0A;border:none;border-radius:9px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .2s;margin-top:8px;}
.btn-login:hover{transform:translateY(-2px);}
.err-box{background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.err-box.show{display:block;}

/* ── DASHBOARD ── */
.dashboard{display:none;}
.header{background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);padding:22px 5%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;}
.header h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.header-right{display:flex;align-items:center;gap:12px;}
.refresh-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:rgba(255,255,255,0.6);padding:9px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s;}
.refresh-btn:hover{background:rgba(255,255,255,0.1);color:white;}
.btn-logout{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-logout:hover{background:rgba(239,68,68,0.2);}

.content{padding:28px 5%;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:32px;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:13px;padding:20px;text-align:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--gold-light);}
.stat-label{font-size:12px;color:var(--gray);margin-top:6px;}

/* Tabs */
.tabs{display:flex;gap:10px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:14px;overflow-x:auto;}
.tab{padding:9px 18px;border-bottom:2px solid transparent;cursor:pointer;font-weight:600;font-size:14px;color:var(--gray);transition:all .2s;white-space:nowrap;}
.tab.active{border-bottom-color:var(--gold);color:var(--gold-light);}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* Order cards */
.orders-grid{display:flex;flex-direction:column;gap:16px;}
.order-card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color .2s;}
.order-card:hover{border-color:rgba(212,160,23,0.3);}
.order-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.order-id-lbl{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--gold-light);}
.order-email-lbl{font-size:12px;color:var(--gray);margin-top:3px;}
.status-pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;}
.pill-Pending{background:rgba(245,200,66,0.1);color:var(--gold-light);border:1px solid rgba(245,200,66,0.25);}
.pill-Verified{background:rgba(34,197,94,0.1);color:#86efac;border:1px solid rgba(34,197,94,0.25);}
.pill-In-Progress{background:rgba(59,130,246,0.1);color:#93c5fd;border:1px solid rgba(59,130,246,0.25);}
.pill-Completed{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.4);}
.pill-Rejected{background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);}

.details-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;margin-bottom:16px;font-size:13px;}
@media(max-width:500px){.details-grid{grid-template-columns:1fr;}}
.detail-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);}
.detail-row:last-child{border:none;}
.detail-lbl{color:var(--gray);}
.detail-val{color:white;font-weight:500;text-align:right;word-break:break-all;}

.action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}
.btn-action{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s,background .2s;border:1px solid transparent;}
.btn-verify{background:rgba(34,197,94,0.12);color:#86efac;border-color:rgba(34,197,94,0.3);}
.btn-verify:hover{background:rgba(34,197,94,0.2);transform:translateY(-1px);}
.btn-progress{background:rgba(59,130,246,0.12);color:#93c5fd;border-color:rgba(59,130,246,0.3);}
.btn-progress:hover{background:rgba(59,130,246,0.2);transform:translateY(-1px);}
.btn-complete{background:rgba(34,197,94,0.18);color:#4ade80;border-color:rgba(34,197,94,0.4);}
.btn-complete:hover{background:rgba(34,197,94,0.28);transform:translateY(-1px);}
.btn-reject{background:rgba(239,68,68,0.1);color:#fca5a5;border-color:rgba(239,68,68,0.3);}
.btn-reject:hover{background:rgba(239,68,68,0.18);transform:translateY(-1px);}

.empty-state{text-align:center;padding:48px 20px;color:var(--gray);}
.empty-icon{font-size:44px;margin-bottom:12px;}

/* Status filter */
.filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);transition:all .2s;}
.filter-btn.active{background:rgba(212,160,23,0.12);border-color:rgba(212,160,23,0.35);color:var(--gold-light);}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e1e1e;border:1px solid rgba(255,255,255,0.12);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:768px){.header{flex-direction:column;align-items:start;}.content{padding:20px 4%;}.details-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>Admin Panel</h2>
    <p class="sub">EngageX Order Management</p>
    <div class="err-box" id="loginErr"></div>
    <form onsubmit="handleLogin(event)">
      <div class="fg"><label>Admin Password</label><input type="password" id="adminPwd" placeholder="Enter password" autofocus required/></div>
      <button type="submit" class="btn-login">🔓 Login</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <h1>📊 Admin Dashboard</h1>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
      <button class="btn-logout" onclick="handleLogout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-label">Total Orders</div></div>
      <div class="stat-card"><div class="stat-num" id="st-pending">0</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num" id="st-verified">0</div><div class="stat-label">Verified</div></div>
      <div class="stat-card"><div class="stat-num" id="st-completed">0</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-num" id="st-revenue">₹0</div><div class="stat-label">Revenue</div></div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" data-tab="pending" onclick="switchTab('pending',this)">⏳ Pending</div>
      <div class="tab" data-tab="verified" onclick="switchTab('verified',this)">✅ Verified</div>
      <div class="tab" data-tab="in-progress" onclick="switchTab('in-progress',this)">🔵 In Progress</div>
      <div class="tab" data-tab="completed" onclick="switchTab('completed',this)">🏆 Completed</div>
      <div class="tab" data-tab="all" onclick="switchTab('all',this)">📋 All Orders</div>
    </div>

    <div class="tab-content active" id="tab-pending">
      <div class="orders-grid" id="grid-pending"></div>
    </div>
    <div class="tab-content" id="tab-verified">
      <div class="orders-grid" id="grid-verified"></div>
    </div>
    <div class="tab-content" id="tab-in-progress">
      <div class="orders-grid" id="grid-in-progress"></div>
    </div>
    <div class="tab-content" id="tab-completed">
      <div class="orders-grid" id="grid-completed"></div>
    </div>
    <div class="tab-content" id="tab-all">
      <div class="orders-grid" id="grid-all"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────
const ADMIN_PASSWORD = 'aman@ybl';   // ← change this
const SHEET_ID       = '1VVnFFUlj5nGOjrnSoGa-RghY5GhrIUTSX8JQN0aV5aA';
const API_KEY        = 'AIzaSyCrioYmiH0BmTanYcQzn_HMXrI4jMgU5ZQ';
// Google Apps Script URL for updating sheet + sending emails
const GAS_URL        = 'https://script.google.com/macros/s/AKfycbzst6jTx27i80IRYSrb9ZtvkA9ww3FNCkhVagUbx6SfbPcqrrUUJKtE1vcMvEhndkE/exec';

// ── AUTH ───────────────────────────────────────────────────
function handleLogin(e) {
  e.preventDefault();
  const pwd   = document.getElementById('adminPwd').value;
  const errEl = document.getElementById('loginErr');
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('adminLoggedIn', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display  = 'block';
    loadOrders();
  } else {
    errEl.textContent = '❌ Incorrect password';
    errEl.classList.add('show');
    document.getElementById('adminPwd').value = '';
  }
}

function handleLogout() {
  sessionStorage.removeItem('adminLoggedIn');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display  = 'none';
  document.getElementById('adminPwd').value = '';
}

// ── TAB ────────────────────────────────────────────────────
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── LOAD ORDERS ────────────────────────────────────────────
let allOrders = [];

async function loadOrders() {
  // 1. From Google Sheet (live data)
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/Orders!A:J?key=${API_KEY}`;
    const res  = await fetch(url);
    const data = await res.json();
    const rows = (data.values || []).slice(1); // skip header

    allOrders = rows
      .filter(r => r[0])
      .map(r => ({
        orderId:       r[0] || '—',
        userEmail:     r[1] || '—',
        userName:      r[2] || '—',
        service:       r[3] || '—',
        bizName:       r[4] || '—',
        total:         r[5] || '0',
        submittedAt:   r[6] || '',
        status:        r[7] || 'Pending',
        txnId:         r[8] || '—',
        waNumber:      r[9] || '—',
        _source: 'sheet'
      }));
  } catch (err) {
    console.warn('Sheet fetch error (using localStorage fallback):', err);
  }

  // 2. Merge / supplement from localStorage
  try {
    const users = JSON.parse(localStorage.getItem('ex_users') || '[]');
    users.forEach(u => {
      (u.orders || []).forEach(o => {
        const existing = allOrders.find(x => x.orderId === o.orderId);
        if (!existing) {
          allOrders.push({
            orderId:     o.orderId,
            userEmail:   u.email,
            userName:    u.name,
            service:     o.service,
            bizName:     o.bizName || '—',
            total:       o.total,
            submittedAt: o.submittedAt,
            status:      o.status,
            txnId:       '—',
            waNumber:    u.phone || '—',
            _source: 'local'
          });
        }
      });
    });
  } catch(e) {}

  // Sort newest first
  allOrders.sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));

  renderAll();
}

// ── RENDER ─────────────────────────────────────────────────
function renderAll() {
  const buckets = {
    pending:     allOrders.filter(o => o.status === 'Pending'),
    verified:    allOrders.filter(o => o.status === 'Verified'),
    'in-progress': allOrders.filter(o => ['In Progress','In-Progress'].includes(o.status)),
    completed:   allOrders.filter(o => o.status === 'Completed'),
    all:         allOrders
  };

  Object.entries(buckets).forEach(([key, orders]) => renderGrid('grid-' + key, orders, key));
  updateStats();
}

function renderGrid(gridId, orders, key) {
  const el = document.getElementById(gridId);
  if (!orders.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No orders here.</p></div>`;
    return;
  }
  el.innerHTML = orders.map(o => orderCardHtml(o, key)).join('');
}

function orderCardHtml(o, tab) {
  const date = o.submittedAt ? new Date(o.submittedAt).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' }) : '—';
  const pillClass = 'pill-' + o.status.replace(' ','-');

  // Action buttons depending on current status
  let actions = '';
  if (o.status === 'Pending') {
    actions = `
      <button class="btn-action btn-verify"   onclick="updateStatus('${o.orderId}','${o.userEmail}','Verified')">✅ Verify</button>
      <button class="btn-action btn-reject"   onclick="updateStatus('${o.orderId}','${o.userEmail}','Rejected')">❌ Reject</button>`;
  } else if (o.status === 'Verified') {
    actions = `
      <button class="btn-action btn-progress" onclick="updateStatus('${o.orderId}','${o.userEmail}','In Progress')">🔵 Mark In Progress</button>
      <button class="btn-action btn-reject"   onclick="updateStatus('${o.orderId}','${o.userEmail}','Rejected')">❌ Reject</button>`;
  } else if (['In Progress','In-Progress'].includes(o.status)) {
    actions = `
      <button class="btn-action btn-complete" onclick="updateStatus('${o.orderId}','${o.userEmail}','Completed')">🏆 Mark Completed</button>`;
  }

  return `<div class="order-card" id="card-${o.orderId}">
    <div class="order-head">
      <div>
        <div class="order-id-lbl">${o.orderId}</div>
        <div class="order-email-lbl">${o.userEmail}</div>
      </div>
      <span class="status-pill ${pillClass}">${o.status}</span>
    </div>
    <div class="details-grid">
      <div class="detail-row"><span class="detail-lbl">Name</span><span class="detail-val">${o.userName}</span></div>
      <div class="detail-row"><span class="detail-lbl">Service</span><span class="detail-val">${o.service}</span></div>
      <div class="detail-row"><span class="detail-lbl">Business</span><span class="detail-val">${o.bizName}</span></div>
      <div class="detail-row"><span class="detail-lbl">Amount</span><span class="detail-val">${o.total}</span></div>
      <div class="detail-row"><span class="detail-lbl">Transaction ID</span><span class="detail-val">${o.txnId}</span></div>
      <div class="detail-row"><span class="detail-lbl">WhatsApp</span><span class="detail-val">${o.waNumber}</span></div>
      <div class="detail-row"><span class="detail-lbl">Date</span><span class="detail-val">${date}</span></div>
      <div class="detail-row"><span class="detail-lbl">Source</span><span class="detail-val" style="color:var(--gray);font-size:11px;">${o._source === 'local' ? 'Local (pre-sheet)' : 'Google Sheet'}</span></div>
    </div>
    ${actions ? `<div class="action-row">${actions}</div>` : ''}
  </div>`;
}

function updateStats() {
  const t = allOrders.length;
  const p = allOrders.filter(o => o.status === 'Pending').length;
  const v = allOrders.filter(o => o.status === 'Verified').length;
  const c = allOrders.filter(o => o.status === 'Completed').length;
  const rev = allOrders.reduce((sum, o) => {
    const n = parseInt((o.total || '0').replace(/[^0-9]/g,'')) || 0;
    return sum + n;
  }, 0);

  document.getElementById('st-total').textContent     = t;
  document.getElementById('st-pending').textContent   = p;
  document.getElementById('st-verified').textContent  = v;
  document.getElementById('st-completed').textContent = c;
  document.getElementById('st-revenue').textContent   = '₹' + rev.toLocaleString('en-IN');
}

// ── UPDATE STATUS ──────────────────────────────────────────
async function updateStatus(orderId, email, newStatus) {
  const label = {
    Verified:    'Verify',
    Rejected:    'Reject',
    'In Progress': 'mark as In Progress',
    Completed:   'mark as Completed'
  }[newStatus] || newStatus;

  if (!confirm(`${label} order ${orderId}?`)) return;

  // Update localStorage (client dashboard)
  try {
    const users = JSON.parse(localStorage.getItem('ex_users') || '[]');
    const uIdx = users.findIndex(u => u.email === email);
    if (uIdx !== -1) {
      const oIdx = (users[uIdx].orders || []).findIndex(o => o.orderId === orderId);
      if (oIdx !== -1) {
        users[uIdx].orders[oIdx].status    = newStatus;
        users[uIdx].orders[oIdx].updatedAt = new Date().toISOString();
        localStorage.setItem('ex_users', JSON.stringify(users));
      }
    }
  } catch(e) {}

  // Update in-memory list
  const idx = allOrders.findIndex(o => o.orderId === orderId);
  if (idx !== -1) allOrders[idx].status = newStatus;

  // Push update to Google Apps Script (updates Sheet + sends email)
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'updateStatus', orderId, email, status: newStatus })
    });
  } catch(e) { console.warn('GAS update warning:', e); }

  showToast(`Order ${orderId} → ${newStatus}`);
  renderAll();
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── INIT ───────────────────────────────────────────────────
if (sessionStorage.getItem('adminLoggedIn')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  loadOrders();
}
</script>
</body>
</html>
